<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Snake · BRICK-20</title>
<style>
  :root{
    /* ── design tokens ─────────────────────────────────────── */
    --page-bg-a:   #ece8df;
    --page-bg-b:   #d9d5c9;

    --shell-dark:     #232325;
    --shell-mid:      #34343a;
    --shell-highlight:#4d4d56;

    --key-face:      #3c3c42;
    --key-highlight: #5a5a63;
    --key-text:      #c9c8c2;

    --lcd-off:       #9fae7d;
    --lcd-off-deep:  #87976a;
    --lcd-ink:       #2f3b22;
    --lcd-ink-faint: rgba(47,59,34,0.16);

    --muted:         #6b675c;

    --font-display: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", "Courier New", monospace;
    --font-body:    -apple-system, "Segoe UI", system-ui, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:40px 16px;
    background: radial-gradient(circle at 50% 0%, var(--page-bg-a), var(--page-bg-b));
    font-family: var(--font-body);
  }

  /* ── phone shell ───────────────────────────────────────── */
  .device{
    position:relative;
    width: 398px;
    padding: 22px 24px 26px;
    border-radius: 34px;
    background: linear-gradient(155deg, var(--shell-highlight) 0%, var(--shell-mid) 45%, var(--shell-dark) 100%);
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.08);
    animation: power-on 900ms ease-out;
  }

  @keyframes power-on{
    0%   { filter: brightness(0.4); }
    12%  { filter: brightness(1.3); }
    20%  { filter: brightness(0.5); }
    32%  { filter: brightness(1.1); }
    100% { filter: brightness(1); }
  }

  .device-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 2px 6px 14px;
  }

  .grille{
    display:flex;
    gap:5px;
  }
  .grille span{
    width:5px; height:5px; border-radius:50%;
    background: rgba(0,0,0,0.45);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.06);
  }

  .led{
    width:7px; height:7px; border-radius:50%;
    background:#3a4a2c;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset;
    transition: background 200ms, box-shadow 200ms;
  }
  .led.alive{
    background:#6fdc6f;
    box-shadow: 0 0 6px 1px rgba(111,220,111,0.85);
    animation: blink-led 1.6s steps(1) infinite;
  }
  .led.dead{
    background:#e25b4f;
    box-shadow: 0 0 6px 1px rgba(226,91,79,0.85);
  }
  @keyframes blink-led{
    0%, 70%{ opacity:1; }
    71%, 100%{ opacity:0.35; }
  }

  /* ── screen recess ─────────────────────────────────────── */
  .screen-bezel{
    position:relative;
    padding: 10px;
    border-radius: 14px;
    background: #14140f;
    box-shadow:
      inset 0 3px 8px rgba(0,0,0,0.65),
      inset 0 0 0 1px rgba(0,0,0,0.6);
  }

  .screen-bezel::after{
    /* subtle glass sheen */
    content:"";
    position:absolute;
    inset:10px;
    border-radius:6px;
    background: linear-gradient(115deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0) 28%);
    pointer-events:none;
  }

  canvas{
    display:block;
    border-radius: 6px;
    image-rendering: pixelated;
  }

  .plate{
    text-align:center;
    margin-top:12px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(201,200,194,0.55);
  }

  /* ── d-pad + keys ──────────────────────────────────────── */
  .controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:20px;
    padding: 0 6px;
  }

  .dpad{
    display:grid;
    grid-template-columns: 34px 34px 34px;
    grid-template-rows: 34px 34px 34px;
    gap:4px;
  }

  .key{
    border:none;
    border-radius:8px;
    background: linear-gradient(160deg, var(--key-highlight), var(--key-face));
    color: var(--key-text);
    font-family: var(--font-display);
    font-size:13px;
    cursor:pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform 80ms, box-shadow 80ms;
  }
  .key:active{
    transform: translateY(1px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .key.up{ grid-area:1/2; }
  .key.left{ grid-area:2/1; }
  .key.center{ grid-area:2/2; font-size:10px; opacity:0.55; cursor:default; }
  .key.right{ grid-area:2/3; }
  .key.down{ grid-area:3/2; }

  .softkeys{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .softkey{
    width:64px;
    height:30px;
    border-radius:8px;
    border:none;
    background: linear-gradient(160deg, var(--key-highlight), var(--key-face));
    color: var(--key-text);
    font-family: var(--font-display);
    font-size:11px;
    letter-spacing:1px;
    cursor:pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .softkey:active{ transform: translateY(1px); }

  .hint{
    max-width: 380px;
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    line-height:1.6;
  }
  .hint b{ color:#46443b; }
</style>
</head>
<body>

  <div class="device">
    <div class="device-top">
      <div class="grille"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="led alive" id="led"></div>
    </div>

    <div class="screen-bezel">
      <canvas id="screen" width="350" height="380"></canvas>
    </div>
    <div class="plate">BRICK&#8209;20 &middot; POCKET LCD</div>

    <div class="controls">
      <div class="dpad">
        <button class="key up" onclick="game.setDir(0,-1)">&#9650;</button>
        <button class="key left" onclick="game.setDir(-1,0)">&#9664;</button>
        <button class="key center">&#9679;</button>
        <button class="key right" onclick="game.setDir(1,0)">&#9654;</button>
        <button class="key down" onclick="game.setDir(0,1)">&#9660;</button>
      </div>
      <div class="softkeys">
        <button class="softkey" onclick="game.togglePause()">II PAUSE</button>
        <button class="softkey" onclick="game.restart()">&#8635; RESTART</button>
      </div>
    </div>
  </div>

  <p class="hint">
    Use <b>arrow keys</b> or <b>WASD</b> to steer &middot; <b>Space</b> or <b>P</b> to pause &middot; <b>R</b> to restart
  </p>

<script>
(function(){
  "use strict";

  // ── Configuration ──────────────────────────────────────────
  const CELL      = 14;   // size of each grid cell in pixels
  const COLS      = 25;   // grid columns
  const ROWS      = 25;   // grid rows
  const STATUS_H  = 30;   // status strip height, in canvas pixels
  const TICK_MS   = 120;  // ms between frames (lower = faster)

  const canvas = document.getElementById("screen");
  const ctx    = canvas.getContext("2d");
  const led    = document.getElementById("led");

  // ── Game state ─────────────────────────────────────────────
  class Game{
    constructor(){
      this.hi = 0;
      this.blink = false;
      this.reset();
      this._timer = null;
    }

    reset(){
      const mx = Math.floor(COLS/2), my = Math.floor(ROWS/2);
      this.snake  = [ {x:mx,y:my}, {x:mx-1,y:my}, {x:mx-2,y:my} ];
      this.dir    = {x:1, y:0};
      this.next   = {x:1, y:0};
      this.score  = 0;
      this.alive  = true;
      this.paused = false;
      this.food   = this.spawnFood();
    }

    spawnFood(){
      const body = new Set(this.snake.map(s => s.x + "," + s.y));
      let pos;
      do{
        pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      } while(body.has(pos.x + "," + pos.y));
      return pos;
    }

    // ── Input ───────────────────────────────────────────────
    setDir(dx, dy){
      if (dx ===  1 && this.dir.x !== -1) this.next = {x:1, y:0};
      if (dx === -1 && this.dir.x !==  1) this.next = {x:-1, y:0};
      if (dy === -1 && this.dir.y !==  1) this.next = {x:0, y:-1};
      if (dy ===  1 && this.dir.y !== -1) this.next = {x:0, y:1};
    }
    togglePause(){ if (this.alive) this.paused = !this.paused; }
    restart(){ this.reset(); }

    // ── One tick of simulation ─────────────────────────────
    tick(){
      this.blink = !this.blink;
      if (!this.alive || this.paused) return;

      this.dir = this.next;
      const head = { x: this.snake[0].x + this.dir.x, y: this.snake[0].y + this.dir.y };

      // wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS){
        this.alive = false; return;
      }
      // self collision (against body, excluding the tail that's about to vacate)
      const bodyMinusTail = this.snake.slice(0, -1);
      if (bodyMinusTail.some(s => s.x === head.x && s.y === head.y)){
        this.alive = false; return;
      }

      this.snake.unshift(head);

      if (head.x === this.food.x && head.y === this.food.y){
        this.score += 10;
        if (this.score > this.hi) this.hi = this.score;
        this.food = this.spawnFood();
      } else {
        this.snake.pop();
      }
    }

    // ── Render ──────────────────────────────────────────────
    draw(){
      const w = COLS*CELL, h = ROWS*CELL;

      // screen backlight with a soft vignette, like a real LCD
      const grad = ctx.createRadialGradient(w/2, STATUS_H + h/2, 20, w/2, STATUS_H + h/2, w*0.75);
      grad.addColorStop(0, "#a6b585");
      grad.addColorStop(1, "#87976a");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // faint pixel matrix across the whole screen (unlit LCD pixels)
      ctx.fillStyle = "rgba(47,59,34,0.14)";
      const dot = 2;
      for (let gx = 0; gx < canvas.width; gx += 4){
        for (let gy = 0; gy < canvas.height; gy += 4){
          ctx.fillRect(gx, gy, dot, dot);
        }
      }

      // ── status strip (ghosted "8888" style digits) ────────
      ctx.textBaseline = "middle";
      ctx.font = "bold 13px ui-monospace, 'SF Mono', 'Courier New', monospace";

      const scoreStr = "SCORE " + String(this.score).padStart(4,"0");
      const hiStr    = "HI " + String(this.hi).padStart(4,"0");
      const ghostScore = "SCORE 8888";
      const ghostHi    = "HI 8888";

      ctx.fillStyle = "rgba(47,59,34,0.18)";
      ctx.textAlign = "left";
      ctx.fillText(ghostScore, 10, STATUS_H/2);
      ctx.textAlign = "right";
      ctx.fillText(ghostHi, w - 10, STATUS_H/2);

      ctx.fillStyle = "#2f3b22";
      ctx.textAlign = "left";
      ctx.fillText(scoreStr, 10, STATUS_H/2);
      ctx.textAlign = "right";
      ctx.fillText(hiStr, w - 10, STATUS_H/2);

      // divider line under status strip
      ctx.strokeStyle = "rgba(47,59,34,0.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, STATUS_H + 0.5);
      ctx.lineTo(w, STATUS_H + 0.5);
      ctx.stroke();

      // ── playfield ──────────────────────────────────────────
      const pad = 1.5;
      const px = (gx) => gx*CELL + pad;
      const py = (gy) => STATUS_H + gy*CELL + pad;
      const size = CELL - pad*2;

      // snake — solid lit squares, head distinguished by a hollow eye-dot
      ctx.fillStyle = "#2f3b22";
      this.snake.forEach((seg, i) => {
        ctx.fillRect(px(seg.x), py(seg.y), size, size);
        if (i === 0){
          ctx.fillStyle = "#a6b585";
          ctx.fillRect(px(seg.x) + size*0.62, py(seg.y) + size*0.22, size*0.18, size*0.18);
          ctx.fillStyle = "#2f3b22";
        }
      });

      // food — blinks between solid and hollow, like a real LCD blink
      if (this.blink){
        ctx.fillRect(px(this.food.x), py(this.food.y), size, size);
      } else {
        ctx.strokeStyle = "#2f3b22";
        ctx.lineWidth = 2;
        ctx.strokeRect(px(this.food.x)+1, py(this.food.y)+1, size-2, size-2);
      }

      // ── overlays ───────────────────────────────────────────
      ctx.textAlign = "center";
      if (!this.alive){
        ctx.font = "bold 22px ui-monospace, 'SF Mono', 'Courier New', monospace";
        ctx.fillStyle = "#2f3b22";
        ctx.fillText("GAME OVER", w/2, STATUS_H + h/2 - 8);
        ctx.font = "12px ui-monospace, 'SF Mono', 'Courier New', monospace";
        ctx.fillText("PRESS R TO RESTART", w/2, STATUS_H + h/2 + 18);
      } else if (this.paused){
        ctx.font = "bold 22px ui-monospace, 'SF Mono', 'Courier New', monospace";
        ctx.fillStyle = "#2f3b22";
        ctx.fillText("PAUSED", w/2, STATUS_H + h/2);
      }

      led.className = "led " + (this.alive ? "alive" : "dead");
    }

    loop(){
      this.tick();
      this.draw();
    }

    start(){
      this.draw();
      this._timer = setInterval(() => this.loop(), TICK_MS);
    }
  }

  const game = new Game();
  window.game = game; // exposed for the on-screen buttons

  // ── keyboard controls ───────────────────────────────────────
  window.addEventListener("keydown", (e) => {
    switch(e.key){
      case "ArrowRight": case "d": case "D": game.setDir(1,0); break;
      case "ArrowLeft":  case "a": case "A": game.setDir(-1,0); break;
      case "ArrowUp":    case "w": case "W": game.setDir(0,-1); break;
      case "ArrowDown":  case "s": case "S": game.setDir(0,1); break;
      case " ": e.preventDefault(); game.togglePause(); break;
      case "p": case "P": game.togglePause(); break;
      case "r": case "R": game.restart(); break;
    }
  });

  game.start();
})();
</script>
</body>
</html>
